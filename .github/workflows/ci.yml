name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"

      - name: Check formatting
        run: terraform fmt -check -recursive -diff

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - environments/dev
          - environments/prod
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"

      - name: Init
        working-directory: ${{ matrix.environment }}
        run: terraform init -backend=false -input=false

      - name: Validate
        working-directory: ${{ matrix.environment }}
        run: terraform validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - modules/vpc-base
          - modules/vpc-peering
          - modules/privatelink
          - modules/transit-gateway
          - modules/waf-v2
          - environments/dev
          - environments/prod
    steps:
      - uses: actions/checkout@v6

      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Init TFLint plugins
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        working-directory: ${{ matrix.directory }}
        run: tflint --format compact

  tfsec:
    name: Trivy (Terraform Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          exit-code: 1
          severity: HIGH,CRITICAL

  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: true

  # --------------------------------------------------------------------------
  # MiniStack Integration Test
  # - Runs on port 4566
  # - Tests both dev and prod environments
  # --------------------------------------------------------------------------
  ministack-integration:
    name: MiniStack Integration Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [terraform-fmt, terraform-validate, tflint]
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"

      - name: Start MiniStack
        run: |
          docker compose up -d
          echo "Waiting for MiniStack readiness..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:4566/_ministack/health > /dev/null 2>&1 && break
            echo "  Attempt $i/30..."
            sleep 3
          done
          echo "MiniStack health check:"
          curl -s http://localhost:4566/_ministack/health | python3 -m json.tool || true

      - name: Test Dev Environment
        run: |
          cd environments/dev
          echo "=== MiniStack: Dev Environment ==="
          terraform fmt -check
          terraform init -input=false
          terraform validate
          terraform apply -auto-approve
          terraform output
          terraform destroy -auto-approve

      - name: Test Prod Environment
        run: |
          cd environments/prod
          echo "=== MiniStack: Prod Environment ==="
          terraform fmt -check
          terraform init -input=false
          terraform validate
          terraform apply -auto-approve
          terraform output
          # Verify critical outputs exist (main_vpc + peering always enabled)
          terraform output -raw main_vpc_id > /dev/null
          terraform output -raw peering_connection_id > /dev/null
          # Verify critical resources in state
          terraform state list | grep -q "module.main_vpc.aws_vpc.this"
          terraform state list | grep -q "module.vpc_peering.aws_vpc_peering_connection.this"
          terraform destroy -auto-approve

      - name: Cleanup
        if: always()
        run: docker compose down -v 2>/dev/null || true
