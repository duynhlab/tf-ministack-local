name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"

      - name: Check formatting
        run: terraform fmt -check -recursive -diff

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - environments/dev
          - environments/prod
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"

      - name: Init
        working-directory: ${{ matrix.environment }}
        run: terraform init -backend=false -input=false

      - name: Validate
        working-directory: ${{ matrix.environment }}
        run: terraform validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - modules/vpc-base
          - modules/vpc-peering
          - modules/privatelink
          - modules/transit-gateway
          - environments/dev
          - environments/prod
    steps:
      - uses: actions/checkout@v6

      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Init TFLint plugins
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        working-directory: ${{ matrix.directory }}
        run: tflint --format compact

  tfsec:
    name: Trivy (Terraform Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          exit-code: 1
          severity: HIGH,CRITICAL

  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: true

  localstack-integration:
    name: LocalStack Integration Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [terraform-fmt, terraform-validate, tflint]
    env:
      LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"

      - name: Start emulators
        run: |
          docker compose up -d ministack
          echo "Waiting for MiniStack..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1 && break
            sleep 3
          done
          curl -s http://localhost:4566/_localstack/health | python3 -m json.tool || true
          if [ -n "${LOCALSTACK_AUTH_TOKEN}" ]; then
            docker compose up -d localstack_pro
            echo "Waiting for LocalStack Pro..."
            for i in $(seq 1 30); do
              curl -sf http://localhost:4567/_localstack/health > /dev/null 2>&1 && break
              sleep 3
            done
            curl -s http://localhost:4567/_localstack/health | python3 -m json.tool || true
          else
            echo "LOCALSTACK_AUTH_TOKEN not set - prod integration test will be skipped."
          fi

      - name: Test Dev Environment
        run: |
          cd environments/dev
          terraform fmt -check
          terraform init -input=false
          terraform validate
          terraform apply -auto-approve
          terraform output
          terraform destroy -auto-approve

      - name: Test Prod Environment
        if: env.LOCALSTACK_AUTH_TOKEN != ''
        run: |
          cd environments/prod
          terraform fmt -check
          terraform init -input=false
          terraform validate
          terraform apply -auto-approve
          terraform output
          terraform output -raw edge_vpc_id > /dev/null
          terraform output -raw peering_connection_id > /dev/null
          terraform output -raw privatelink_endpoint_service_name > /dev/null
          terraform output -raw tgw_id_region_a > /dev/null
          terraform output -raw tgw_id_region_b > /dev/null
          terraform state list | grep -q "module.edge_vpc.aws_vpc.this"
          terraform state list | grep -q "module.vpc_peering.aws_vpc_peering_connection.this"
          terraform state list | grep -q "module.privatelink.aws_vpc_endpoint_service.this"
          terraform state list | grep -q "module.transit_gateway.aws_ec2_transit_gateway.region_a"
          terraform state list | grep -q "module.transit_gateway.aws_ec2_transit_gateway.region_b"
          terraform destroy -auto-approve

      - name: Cleanup
        if: always()
        run: docker compose down -v 2>/dev/null || true
