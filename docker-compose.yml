services:
  ministack:
    image: nahuelnucera/ministack:latest
    container_name: ministack-vpc-lab
    ports:
      - "4566:4566"
    environment:
      - GATEWAY_PORT=4566
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  localstack_pro:
    image: localstack/localstack-pro:latest
    container_name: localstack-vpc-lab
    ports:
      - "4567:4566"
      - "4510-4559:4510-4559"
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
      - SERVICES=ec2,sts,elbv2
      - DEFAULT_REGION=ap-southeast-1
      - EAGER_SERVICE_LOADING=1
      - DEBUG=${DEBUG:-0}
    volumes:
      - "./volume:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
